# Browser-like preset. This does not change the application defaults.
# Launch with:
#   .\scripts\run-config-demo.ps1 -Config .\browser-viewer.conf.yml

producer:
  url: https://example.com
  force_transparency: false
  viewer_visible: true
  alpha_probe_enabled: false
  viewport:
    width: 1920
    height: 1080
  frame_rate: 30

viewer:
  # Keep empty to display the producer URL. Set this to navigate after connect.
  navigate: ""
  window:
    # Width and height are the restored size used after un-maximizing.
    width: 1440
    height: 900
    toolbar_visible: true
    # Reserve the toolbar band instead of drawing page content underneath it.
    toolbar_overlays_content: false
    # Aspect-fit resembles a normal responsive browser viewport.
    pixel_perfect: false
    # Maximized keeps normal window chrome and the browser toolbar, unlike F11.
    maximized: true
    fullscreen: false
