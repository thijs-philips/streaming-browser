# Configuration for streaming_viewer.exe (the default D3D11 viewer sink).
# Launch with: streaming_viewer.exe --config=<path-to-this-file>
# Command-line switches override values loaded from this file.

# Optional URL sent after the viewer connects. Leave empty to keep the
# producer's URL.
navigate: ""
window:
  width: 1280
  height: 760
  # Menu bar with the View pulldown.
  show_toolbar: true
  # Navigation row: back/forward, reload/stop, URL field, and Go.
  show_url_bar: true
  # true preserves the original overlay layout; false reserves a browser-like
  # URL-bar band above the rendered page.
  url_bar_overlays_content: true
  pixel_perfect: false
  maximized: false
  fullscreen: false
