# Shared configuration for streaming_browser.exe and streaming_viewer.exe.
# Both executables read only their own section. Command-line switches override
# values loaded from this file.

producer:
  url: https://example.com
  force_transparency: true
  viewer_visible: true
  alpha_probe_enabled: false
  viewport:
    width: 3840
    height: 2160
  # CEF treats this as a maximum; change-driven pages may produce fewer frames.
  frame_rate: 30

viewer:
  # Optional URL sent after the viewer connects. Leave empty to keep the
  # producer URL above.
  navigate: ""
  window:
    width: 1280
    height: 760
    toolbar_visible: true
    pixel_perfect: false
    fullscreen: false
